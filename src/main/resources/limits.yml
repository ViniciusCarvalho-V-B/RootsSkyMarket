# ====================================================================
#              RootsSkyMarket - LIMITES DO ANTI-MONOPÓLIO             
# ====================================================================
# Aqui você pode definir o limite de vendas diárias por jogador para
# cada tipo de item individual da loja.
#
# Para cada item, você pode configurar:
#   enabled: true/false -> Se o limite individual está ativado para este item.
#                          Se for false, o item usará o limite padrão (max_sell_per_day).
#   limit: número       -> O limite máximo de itens que podem ser vendidos por dia.
#
# Observação: Os limites de jogadores VIPs serão multiplicados e escalados
# automaticamente com base nos valores definidos em 'anti_monopoly.vip_limits'
# no arquivo config.yml principal.
# ====================================================================

limits:
